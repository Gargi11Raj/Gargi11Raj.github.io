  <!--alertbox-->
  <div class="alert alert-primary alert-dismissible fade show" role="alert">
    The fields marked <font class="text-danger">*</font> are mandatory.
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>


  <!--Actual Form-->
    <section class="container-fluid bg">
      <section class="row justify-content-center">
        <section class="col-12 col-sm-6 col-md-3">

          <form class="form-container">

            <div class="row mb-3">
              <div class="col">
                <label for="inputName1" class="form-label">First Name <font class="text-danger">*</font></label>
                <input type="text" class="form-control" placeholder="First name" required>
              </div>
              <div class="col">
                <label for="inputName2" class="form-label">Last Name</label>
                <input type="text" class="form-control" placeholder="Last name">
              </div>

            </div>
            <div class="mb-3">
              <label for="RollNumber" class="form-label">Roll Number <font class="text-danger">*</font></label>
              <input type="text" class="form-control" id="RollNumber" placeholder="22AA00001" required>
            </div>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email address</label>
              <input type="email" class="form-control" id="exampleInputEmail1" required>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1">
              <label class="form-check-label" for="exampleCheck1">I shall abide by the Rules & Regulations.</label>
            </div>

            <div class="d-grid gap-2 col-9 mx-auto">
              <!-- Button trigger modal -->
              <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal"
                data-bs-target="#exampleModal">
                Submit
              </button>

              <!-- Modal -->
              <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title" id="exampleModalLabel">Confirmation</h5>
                      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                      The data entered cannot be changed later. Are you sure you want to save these changes?
                    </div>
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                      <button type="button" class="btn btn-primary">Save changes</button>
                    </div>
                  </div>
                </div>
              </div>


              <button type="button" class="btn btn-outline-primary">
                Reset
              </button>
            </div>
          </form>
        </section>
      </section>
    </section>
 

  <footer class="footer mt-auto py-3">
